parameters:
  - name: azureServiceConnection
    type: string
  - name: subscriptionId
    type: string
  - name: tenantId
    type: string
  - name: clientId
    type: string
  - name: clientSecret
    type: string
  # ... (other backend params)

steps:
  - task: TerraformTaskV4@4
    displayName: 'Terraform init'
    inputs:
      provider: 'azurerm'
      command: 'init'
      # ...
    env:
      # These environment variables authenticate Terraform directly
      ARM_SUBSCRIPTION_ID: ${{ parameters.subscriptionId }}
      ARM_TENANT_ID: ${{ parameters.tenantId }}
      ARM_CLIENT_ID: ${{ parameters.clientId }}
      ARM_CLIENT_SECRET: ${{ parameters.clientSecret }}