# Azure Pipelines YAML file for Terraform deployment
trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

parameters:
  - name: targetEnvironment
    type: string
    default: dev
    values:
      - dev
      - staging
      - prod

variables:
  - group: terraform-secrets-vg
  - name: terraformVersion
    value: '1.6.6'
  - name: azureServiceConnection
    value: 'Azure-Pipeline-SC'
  - name: backendResourceGroupName
    value: 'tfstate-rg'
  - name: backendStorageAccountName
    value: 'senlab029tfstate'
  - name: backendContainerName
    value: 'tfstate'
  - name: environment
    value: ${{ parameters.targetEnvironment }}
  - name: backendKey
    value: 'terraform-${{ parameters.targetEnvironment }}.tfstate'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: TerraformInit
    displayName: 'Terraform Init - ${{ parameters.targetEnvironment }}'
    jobs:
      - job: Init
        displayName: 'Init Terraform'
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: '$(terraformVersion)'

          - task: TerraformTaskV4@4
            displayName: 'Terraform init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '.'
              backendType: 'azurerm'
              ensureBackend: true
              backendServiceArm: '$(azureServiceConnection)'
              backendAzureRmResourceGroupName: '$(backendResourceGroupName)'
              backendAzureRmStorageAccountName: '$(backendStorageAccountName)'
              backendAzureRmContainerName: '$(backendContainerName)'
              backendAzureRmKey: '$(backendKey)'
              enableTelemetry: false

  - stage: TerraformPlan
    displayName: 'Terraform Plan - ${{ parameters.targetEnvironment }}'
    dependsOn: TerraformInit
    jobs:
      - job: Plan
        displayName: 'Plan Terraform'
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: '$(terraformVersion)'

          # RE-INIT: Necessary for every job on a fresh agent
          - task: TerraformTaskV4@4
            displayName: 'Terraform init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendType: 'azurerm'
              ensureBackend: true
              backendServiceArm: '$(azureServiceConnection)'
              backendAzureRmResourceGroupName: '$(backendResourceGroupName)'
              backendAzureRmStorageAccountName: '$(backendStorageAccountName)'
              backendAzureRmContainerName: '$(backendContainerName)'
              backendAzureRmKey: '$(backendKey)'

          - task: TerraformTaskV4@4
            displayName: 'Terraform plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '.'
              environmentServiceNameAzureRM: '$(azureServiceConnection)'
              commandOptions: '-out=tfplan.out'
              vars: |
                environment=$(environment)
            env:
                ARM_SUBSCRIPTION_ID: $(subscription-id)
                ARM_TENANT_ID: $(tenant-id)
                ARM_CLIENT_ID: $(client-id)
                ARM_CLIENT_SECRET: $(client-secretnew)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Terraform plan'
            inputs:
              targetPath: '$(Build.SourcesDirectory)/tfplan.out'
              artifact: 'tfplan'

  - stage: TerraformApply
    displayName: 'Terraform Apply - ${{ parameters.targetEnvironment }}'
    dependsOn: TerraformPlan
    condition: and(succeeded(), or(eq(variables['Build.Reason'], 'Manual'), eq('${{ parameters.targetEnvironment }}', 'dev')))
    jobs:
      - job: Apply
        displayName: 'Apply Terraform'
        steps:
          - download: current
            artifact: 'tfplan'

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: '$(terraformVersion)'

          # RE-INIT: Necessary for every job on a fresh agent
          - task: TerraformTaskV4@4
            displayName: 'Terraform init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendType: 'azurerm'
              ensureBackend: true
              backendServiceArm: '$(azureServiceConnection)'
              backendAzureRmResourceGroupName: '$(backendResourceGroupName)'
              backendAzureRmStorageAccountName: '$(backendStorageAccountName)'
              backendAzureRmContainerName: '$(backendContainerName)'
              backendAzureRmKey: '$(backendKey)'

          - task: TerraformTaskV4@4
            displayName: 'Terraform apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              commandOptions: 'tfplan.out'
              workingDirectory: '.'
              environmentServiceNameAzureRM: '$(azureServiceConnection)'
            env:
              ARM_SUBSCRIPTION_ID: $(subscription-id)
              ARM_TENANT_ID: $(tenant-id)
              ARM_CLIENT_ID: $(client-id)
              ARM_CLIENT_SECRET: $(client-secretnew) 