trigger:
  branches:
    include:
      - main

variables:
  # Links your Key Vault secrets to the pipeline
  - group: 'terraform-secrets-vg'
  
  # Non-sensitive infrastructure variables
  azureServiceConnection: 'Azure-Pipeline-SC'
  backendResourceGroupName: 'tfstate-rg'
  backendStorageAccountName: 'senlab029tfstate'
  backendContainerName: 'tfstate'

parameters:
  - name: targetEnvironment
    type: string
    default: dev
    values:
      - dev
      - staging
      - prod

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: TerraformPlan
    displayName: 'Terraform Plan - ${{ parameters.targetEnvironment }}'
    jobs:
      - job: Plan
        displayName: 'Plan Terraform'
        steps:
          # Initializes using the template
          - template: templates/terraform-init-template.yml
            parameters:
              azureServiceConnection: $(azureServiceConnection)
              subscriptionId: $(AZURE_SUBSCRIPTION_ID)
              tenantId: $(AZURE_TENANT_ID)
              clientId: $(AZURE_CLIENT_ID)
              clientSecret: $(AZURE_CLIENT_SECRET)
              backendResourceGroupName: $(backendResourceGroupName)
              backendStorageAccountName: $(backendStorageAccountName)
              backendContainerName: $(backendContainerName)
              backendKey: 'terraform-${{ parameters.targetEnvironment }}.tfstate'

          # Plan step (Authenticates directly via env block)
          - task: TerraformTaskV4@4
            displayName: 'Terraform plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              environmentServiceNameAzureRM: $(azureServiceConnection)
              commandOptions: '-out=tfplan.out'
              vars: |
                environment=${{ parameters.targetEnvironment }}
            env:
              ARM_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(AZURE_TENANT_ID)
              ARM_CLIENT_ID: $(AZURE_CLIENT_ID)
              ARM_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
              TF_VAR_db_password: $(DB_PASSWORD)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Terraform plan'
            inputs:
              targetPath: '$(Build.SourcesDirectory)/tfplan.out'
              artifact: 'tfplan'

  - stage: TerraformApply
    displayName: 'Terraform Apply - ${{ parameters.targetEnvironment }}'
    dependsOn: TerraformPlan
    condition: and(succeeded(), or(eq(variables['Build.Reason'], 'Manual'), eq('${{ parameters.targetEnvironment }}', 'dev')))
    jobs:
      - job: Apply
        displayName: 'Apply Terraform'
        steps:
          - download: current
            artifact: 'tfplan'

          # Re-initializes using the template
          - template: templates/terraform-init-template.yml
            parameters:
              azureServiceConnection: $(azureServiceConnection)
              subscriptionId: $(AZURE_SUBSCRIPTION_ID)
              tenantId: $(AZURE_TENANT_ID)
              clientId: $(AZURE_CLIENT_ID)
              clientSecret: $(AZURE_CLIENT_SECRET)
              backendResourceGroupName: $(backendResourceGroupName)
              backendStorageAccountName: $(backendStorageAccountName)
              backendContainerName: $(backendContainerName)
              backendKey: 'terraform-${{ parameters.targetEnvironment }}.tfstate'

          # Apply step (Authenticates directly via env block)
          - task: TerraformTaskV4@4
            displayName: 'Terraform apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              commandOptions: 'tfplan.out'
              environmentServiceNameAzureRM: $(azureServiceConnection)
              args: '-auto-approve'
            env:
              ARM_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(AZURE_TENANT_ID)
              ARM_CLIENT_ID: $(AZURE_CLIENT_ID)
              ARM_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)